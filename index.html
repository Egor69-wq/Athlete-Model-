<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Athlete Twin Pro 458K</title>
<style>body{background:#0a0a0f;color:#e0e0e0;font-family:sans-serif;padding:10px}
input{padding:10px;width:100%;background:#111;border:1px solid #4CAF50;color:#fff;border-radius:8px;margin:8px 0}
input:focus{border-color:#4CAF50;outline:none}
.sug{cursor:pointer;padding:8px;border-bottom:1px solid #222}.sug:hover{background:#1a1a2e}
.card{background:#12121a;padding:12px;border-radius:8px;margin:8px 0}
.btn{padding:10px;background:#4CAF50;color:#fff;border:none;border-radius:8px;width:100%}</style></head>
<body><h2>Athlete Twin Pro</h2><p id="status">Loading...</p>
<input type="text" id="search" placeholder="Search 458K foods..." oninput="searchFood()" autocomplete="off"><div id="box"></div>
<div class="card"><b>Diary (<span id="count">0</span>)</b><div id="diary"></div></div>
<button class="btn" onclick="resetDiary()">Clear</button>
<script src="data1.js"></script><script src="data2.js"></script>
<script>
var DB=FOODS1.concat(FOODS2);
document.getElementById("status").textContent="OK "+DB.length+" USDA";
function searchFood(){
var q=document.getElementById("search").value.toLowerCase();
var box=document.getElementById("box");
if(!q){box.innerHTML="";return;}
var r=DB.filter(function(f){return f.n.toLowerCase().indexOf(q)>=0;}).slice(0,15);
box.innerHTML=r.map(function(f){return'<div class="sug" onclick="addFood("'+f.n+'")">'+f.n+' | Cal '+f.c+'</div>';}).join("");
}
var diary=[];
function addFood(name){
var f=DB.find(function(x){return x.n===name;});
if(!f)return;
var g=parseFloat(prompt("Grams?","100"));
if(!g)return;
diary.push({name:f.n,g:g,cal:Math.round(f.c*g/100)});
document.getElementById("search").value="";document.getElementById("box").innerHTML="";
updateDiary();
}
function updateDiary(){
document.getElementById("count").textContent=diary.length;
document.getElementById("diary").innerHTML=diary.map(function(d){return"<div>"+d.name+" - "+d.g+"g ("+d.cal+"kcal)</div>";}).join("");
}
function resetDiary(){diary=[];updateDiary();}
</script></body></html>
