<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Athlete Twin Pro</title>
<style>:root{--bg:#0a0a0f;--card:#12121a;--accent:#4CAF50}*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:var(--bg);color:#e0e0e0;padding:10px}h2{text-align:center}input{padding:12px;background:#0a0a0f;border:1px solid #1a1a2e;border-radius:10px;color:#fff;font-size:14px;width:100%;margin:8px 0}input:focus{border-color:var(--accent);outline:none}.card{background:var(--card);border-radius:12px;padding:12px;margin:8px 0}.btn{padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;width:100%;margin:4px 0;cursor:pointer}.status{font-size:11px;color:#888;text-align:center}.sug{cursor:pointer;padding:10px;border-bottom:1px solid #1a1a2e}.sug:hover{background:#1a1a2e}.bar{height:6px;background:#1a1a2e;border-radius:3px;margin:3px 0;overflow:hidden}.fill{height:100%;border-radius:3px}.green{background:#4CAF50}.yellow{background:#ff9800}.red{background:#ff5252}</style></head><body>
<h2>Athlete Twin Pro</h2><p class="status" id="status">Loading...</p>
<input type="text" id="search" placeholder="Search 458K foods..." oninput="searchFood()" autocomplete="off"><div id="box"></div>
<div class="card"><b>Diary (<span id="count">0</span>)</b><div id="diary"></div><div id="totals" style="display:none"><div>Protein: <b id="tp">0g</b></div><div class="bar"><div id="barPro" class="fill green" style="width:0%"></div></div><div>Fat: <b id="tf">0g</b></div><div class="bar"><div id="barFat" class="fill green" style="width:0%"></div></div><div>Carbs: <b id="tc">0g</b></div><div class="bar"><div id="barCar" class="fill green" style="width:0%"></div></div><div>Calories: <b id="tcal">0</b></div></div><button class="btn" onclick="resetDiary()">Clear</button></div>
<script>
var DB=[],NORMS={pro:120,fat:70,car:300};
async function load(){
var all=[];
for(var i=0;i<7;i++){
var r=await fetch("final_chunks/c"+i+".txt");
var t=await r.text();
var bin=atob(t);
var bytes=new Uint8Array(bin.length);
for(var j=0;j<bin.length;j++)bytes[j]=bin.charCodeAt(j);
var ds=new DecompressionStream("gzip");
var w=ds.writable.getWriter();w.write(bytes);w.close();
var result=await ds.readable.getReader().read();
var raw=JSON.parse(new TextDecoder().decode(result.value));
for(var k=0;k<raw.length;k++){all.push({name:raw[k].n,cal:raw[k].c,pro:raw[k].p,fat:raw[k].f,car:raw[k].ch});}
document.getElementById("status").textContent="Loaded "+all.length+" foods...";
}
DB=all;document.getElementById("status").textContent="OK "+DB.length+" USDA";
}
load();function searchFood(){
var q=document.getElementById("search").value.toLowerCase().trim();
var box=document.getElementById("box");
if(!q||!DB.length){box.innerHTML="";return;}
var r=DB.filter(function(f){return f.name.toLowerCase().indexOf(q)>=0;}).slice(0,15);
var h="";
for(var k=0;k<r.length;k++){
h+="<div class=sug onclick=addFood('"+r[k].name+"')><b>"+r[k].name+"</b></div>";
}
box.innerHTML=h;
}
var diary=[];
function addFood(name){
var f=DB.find(function(x){return x.name===name;});
if(!f)return;
var g=parseFloat(prompt("Grams?","100"));
if(!g)return;
diary.push({name:f.name,g:g,cal:Math.round(f.cal*g/100),pro:Math.round(f.pro*g/10)/10,fat:Math.round(f.fat*g/10)/10,car:Math.round(f.car*g/10)/10});
document.getElementById("search").value="";
document.getElementById("box").innerHTML="";
updateDiary();saveDiary();
}

function searchFood(){
var q=document.getElementById("search").value.toLowerCase().trim();
var box=document.getElementById("box");
if(!q||!DB.length){box.innerHTML="";return;}
var r=DB.filter(function(f){return f.name.toLowerCase().indexOf(q)>=0;}).slice(0,15);
var h="";
for(var k=0;k<r.length;k++){h+="<div class=sug onclick=addFood('"+r[k].name+"')><b>"+r[k].name+"</b></div>";}
box.innerHTML=h;
}
var diary=[];
function addFood(name){
var f=DB.find(function(x){return x.name===name;});
if(!f)return;
var g=parseFloat(prompt("Grams?","100"));
if(!g)return;
diary.push({name:f.name,g:g,cal:Math.round(f.cal*g/100),pro:Math.round(f.pro*g/10)/10,fat:Math.round(f.fat*g/10)/10,car:Math.round(f.car*g/10)/10});
document.getElementById("search").value="";document.getElementById("box").innerHTML="";
updateDiary();saveDiary();
}
function updateDiary(){
document.getElementById("count").textContent=diary.length;
var t=document.getElementById("totals");
if(!diary.length){document.getElementById("diary").innerHTML="Empty";t.style.display="none";return;}
t.style.display="block";
var tp=0,tf=0,tc=0,tcal=0,h="";
for(var i=0;i<diary.length;i++){var d=diary[i];tp+=d.pro;tf+=d.fat;tc+=d.car;tcal+=d.cal;h+="<div>"+d.name+" "+d.g+"g</div>";}
document.getElementById("diary").innerHTML=h;
document.getElementById("tp").textContent=Math.round(tp)+"g";
document.getElementById("tf").textContent=Math.round(tf)+"g";
document.getElementById("tc").textContent=Math.round(tc)+"g";
document.getElementById("tcal").textContent=Math.round(tcal);
var pp=Math.min(100,tp/NORMS.pro*100);
document.getElementById("barPro").style.width=pp+"%";
}
function del(i){diary.splice(i,1);updateDiary();saveDiary();}
function resetDiary(){if(confirm("Clear?")){diary=[];updateDiary();saveDiary();}}
function saveDiary(){localStorage.setItem("ad",JSON.stringify(diary));}
var saved=localStorage.getItem("ad");if(saved){diary=JSON.parse(saved);updateDiary();}
</script></body></html>
