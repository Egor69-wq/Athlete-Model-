<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Twin</title>
<style>
body{background:#0a0a0f;color:#fff;font-family:sans-serif;padding:10px}
input{padding:10px;width:100%;background:#111;border:1px solid #4CAF50;color:#fff;border-radius:8px}
.card{background:#12121a;padding:10px;margin:5px 0;border-radius:8px}
.btn{background:#4CAF50;color:#fff;padding:10px;border:none;border-radius:8px;margin:3px}
.sug{cursor:pointer;padding:8px;border-bottom:1px solid #333}
.sug:hover{background:#1a1a2e}
</style>
</head>
<body>
<h2>🧬 Athlete Twin</h2>
<p id="status">Загрузка...</p>
<input type="text" id="search" placeholder="Поиск продукта..." oninput="safeSearch()">
<div id="box"></div>
<div class="card"><b>Дневник:</b> <span id="count">0</span></div>
<div id="diary"></div>

<script>
var DB=[],loaded=false;

async function init(){
  try{
    for(var i=0;i<10;i++){
      var r=await fetch('data_chunks/chunk_'+i+'.txt');
      var t=await r.text();
      var bin=atob(t);
      var bytes=new Uint8Array(bin.length);
      for(var j=0;j<bin.length;j++)bytes[j]=bin.charCodeAt(j);
      var ds=new DecompressionStream('gzip');
      var w=ds.writable.getWriter();w.write(bytes);w.close();
      var result=await ds.readable.getReader().read();
      var raw=JSON.parse(new TextDecoder().decode(result.value));
      DB=DB.concat(raw.map(function(r){return{name:r[0],cal:r[1][0],pro:r[1][1],fat:r[1][2],car:r[1][3]};}));
      document.getElementById('status').textContent='Загружено '+DB.length+' продуктов';
    }
    loaded=true;
    document.getElementById('status').textContent='✅ '+DB.length+' продуктов USDA';
  }catch(e){
    document.getElementById('status').textContent='Ошибка: '+e.message;
    console.error(e);
  }
}
init();

function safeSearch(){
  try{
    var q=document.getElementById('search').value.toLowerCase();
    var box=document.getElementById('box');
    if(!q||!loaded){box.innerHTML='';return;}
    var r=DB.filter(function(f){return f.name.toLowerCase().indexOf(q)>=0;}).slice(0,10);
    var h='';
    for(var k=0;k<r.length;k++){
      var f=r[k];
      h+='<div class="sug" onclick="safeAdd(\''+f.name.replace(/'/g,'')+'\')">'+f.name+' | 🔥'+f.cal+'ккал</div>';
    }
    box.innerHTML=h;
  }catch(e){console.error(e);}
}

var diary=[];
function safeAdd(name){
  try{
    var f=DB.find(function(x){return x.name===name;});
    if(!f)return;
    var g=parseFloat(prompt('Граммы?','100'));
    if(!g)return;
    diary.push({name:f.name,grams:g,cal:Math.round(f.cal*g/100)});
    document.getElementById('search').value='';
    document.getElementById('box').innerHTML='';
    updateDiary();
    localStorage.setItem('diary',JSON.stringify(diary));
  }catch(e){console.error(e);}
}

function updateDiary(){
  try{
    document.getElementById('count').textContent=diary.length;
    var h='';
    for(var i=0;i<diary.length;i++){
      var item=diary[i];
      h+='<div style="padding:5px;border-bottom:1px solid #222">'+item.name+' - '+item.grams+'г ('+item.cal+'ккал) <span style="color:red;cursor:pointer" onclick="del('+i+')">✕</span></div>';
    }
    document.getElementById('diary').innerHTML=h;
  }catch(e){console.error(e);}
}

function del(i){diary.splice(i,1);updateDiary();localStorage.setItem('diary',JSON.stringify(diary));}

var saved=localStorage.getItem('diary');
if(saved){try{diary=JSON.parse(saved);updateDiary();}catch(e){}}
</script>
</body>
</html>
